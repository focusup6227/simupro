# Deploy to Namecheap cPanel (Passenger) when pushing to main.
# Required CI/CD variables: SSH_PRIVATE_KEY (File), SSH_KNOWN_HOSTS, SERVER_USER, SERVER_HOST, APP_DIR

stages:
  - deploy

deploy:cpanel-passenger:
  stage: deploy
  image: alpine:3.21
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  before_script:
    - apk add --no-cache openssh-client bash
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - printf '%s\n' "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
    - chmod 644 ~/.ssh/known_hosts
    - eval "$(ssh-agent -s)"
    # SSH_PRIVATE_KEY must be a CI/CD variable of type "File"
    - ssh-add "$SSH_PRIVATE_KEY"
  script:
    - |
      SSH_PORT="${SERVER_SSH_PORT:-22}"
      ssh -p "$SSH_PORT" -o BatchMode=yes -o StrictHostKeyChecking=yes "$SERVER_USER@$SERVER_HOST" bash -s << EOF
      set -euo pipefail
      cd "${APP_DIR}"
      git fetch origin
      git checkout main
      git reset --hard origin/main
      npm ci
      npm run build
      mkdir -p tmp
      touch tmp/restart.txt
      EOF
